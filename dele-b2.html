<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DELE B2 · 每日单词卡</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;
  --card-bg:#fffef9;
  --text:#2c2416;
  --text-secondary:#6b5e4a;
  --accent:#c0392b;
  --accent-light:#e74c3c;
  --gold:#d4a017;
  --gold-light:#f0d060;
  --green:#27ae60;
  --green-light:#2ecc71;
  --red-soft:#e74c3c;
  --border:#e8dcc8;
  --shadow:0 2px 16px rgba(0,0,0,.07);
  --shadow-lg:0 8px 40px rgba(0,0,0,.12);
  --radius:16px;
  --radius-sm:10px;
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  --font-serif:Georgia,'Times New Roman',serif;
}
body{
  font-family:var(--font-sans);
  background:linear-gradient(180deg, #fef9f0 0%, #faf8f5 30%, #f5f0e8 100%);
  color:var(--text);
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
}
header{
  width:100%;
  max-width:480px;
  text-align:center;
  padding:24px 0 8px;
}
header h1{
  font-size:1.5rem;
  font-weight:700;
  color:var(--accent);
  letter-spacing:-0.02em;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
header h1 .flag{font-size:1.6rem}
header .category-badge{
  display:inline-block;
  margin-top:8px;
  background:var(--gold);
  color:#fff;
  font-size:.78rem;
  font-weight:600;
  padding:4px 14px;
  border-radius:20px;
  letter-spacing:.04em;
}
.progress-wrap{
  width:100%;
  max-width:480px;
  margin:12px 0 4px;
}
.progress-stats{
  display:flex;
  justify-content:space-between;
  font-size:.8rem;
  color:var(--text-secondary);
  margin-bottom:4px;
  font-weight:500;
}
.progress-bar{
  width:100%;
  height:8px;
  background:var(--border);
  border-radius:4px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold-light));
  border-radius:4px;
  transition:width .4s ease;
  width:0%;
}
.card-stage{
  width:100%;
  max-width:480px;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 0;
  perspective:1200px;
}
.card-container{
  width:100%;
  aspect-ratio:3/4;
  max-height:520px;
  cursor:pointer;
  position:relative;
}
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:var(--radius);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:36px 28px;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--border);
  background:var(--card-bg);
  overflow:hidden;
}
.card-front{z-index:2}
.card-front::before{
  content:'';
  position:absolute;
  top:-40px;
  right:-40px;
  width:120px;
  height:120px;
  background:radial-gradient(circle,rgba(212,160,23,.12) 0%,transparent 70%);
  border-radius:50%;
}
.card-front .tap-hint{
  position:absolute;
  bottom:22px;
  font-size:.68rem;
  color:var(--text-secondary);
  opacity:.5;
  letter-spacing:.04em;
  animation:pulse 2s ease infinite;
}
@keyframes pulse{
  0%,100%{opacity:.35}
  50%{opacity:.7}
}
.card-front .pos-tag{
  position:absolute;
  top:16px;
  right:18px;
  font-size:.65rem;
  font-weight:700;
  color:var(--accent);
  background:rgba(192,57,43,.08);
  padding:4px 12px;
  border-radius:12px;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.card-front .word-display{
  font-family:var(--font-serif);
  font-size:2.1rem;
  font-weight:700;
  color:var(--text);
  text-align:center;
  line-height:1.3;
  word-break:break-word;
  z-index:1;
}
.card-front .word-display.small{font-size:1.4rem}
.card-back{
  transform:rotateY(180deg);
  justify-content:flex-start;
  text-align:center;
  gap:10px;
  overflow-y:auto;
}
.card-back .meaning{
  font-size:1.5rem;
  font-weight:700;
  color:var(--accent);
  line-height:1.4;
}
.card-back .pos-full{
  font-size:.72rem;
  font-weight:700;
  color:var(--gold);
  background:rgba(212,160,23,.1);
  padding:3px 12px;
  border-radius:12px;
  letter-spacing:.04em;
}
.card-back .example-box{
  margin-top:8px;
  padding:16px;
  background:rgba(0,0,0,.02);
  border-radius:var(--radius-sm);
  border:1px dashed var(--border);
  width:100%;
}
.card-back .example-es{
  font-family:var(--font-serif);
  font-size:.92rem;
  color:var(--text);
  font-style:italic;
  line-height:1.55;
  text-align:left;
}
.card-back .example-zh{
  font-size:.78rem;
  color:var(--text-secondary);
  margin-top:6px;
  line-height:1.4;
  text-align:left;
}
.actions{
  width:100%;
  max-width:480px;
  display:none;
  gap:12px;
  margin-top:12px;
  padding:0 4px 8px;
}
.btn{
  flex:1;
  padding:15px 16px;
  border:none;
  border-radius:var(--radius-sm);
  font-size:.95rem;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  letter-spacing:.02em;
  font-family:var(--font-sans);
}
.btn:active{transform:scale(.96)}
.btn-forgot{
  background:#fff;
  color:#d35400;
  border:2px solid #f0c8a0;
}
.btn-forgot:hover{background:#fff8f2}
.btn-mastered{
  background:var(--green);
  color:#fff;
  border:2px solid var(--green);
}
.btn-mastered:hover{background:var(--green-light);border-color:var(--green-light)}
.completed{
  text-align:center;
  animation:fadeInUp .6s ease;
}
.completed .trophy{font-size:4.5rem;display:block;margin-bottom:16px;animation:bounce .8s ease}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  30%{transform:translateY(-20px)}
  50%{transform:translateY(0)}
  70%{transform:translateY(-10px)}
}
.completed h2{font-size:1.5rem;color:var(--accent);margin-bottom:8px}
.completed p{font-size:.9rem;color:var(--text-secondary);margin-bottom:4px}
.toast{
  position:fixed;
  top:24px;
  left:50%;
  transform:translateX(-50%) translateY(-120px);
  background:#333;
  color:#fff;
  padding:10px 24px;
  border-radius:24px;
  font-size:.85rem;
  font-weight:600;
  z-index:1000;
  pointer-events:none;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
footer{
  width:100%;
  max-width:480px;
  text-align:center;
  padding:8px 0 20px;
}
.btn-reset{
  background:none;
  border:1px solid #ddd;
  color:#aaa;
  padding:8px 20px;
  border-radius:20px;
  font-size:.73rem;
  cursor:pointer;
  transition:all .2s;
  font-family:var(--font-sans);
}
.btn-reset:hover{color:var(--red-soft);border-color:var(--red-soft)}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes masteredFly{
  0%{opacity:1;transform:scale(1) translateY(0)}
  50%{opacity:.6;transform:scale(1.05) translateY(-30px)}
  100%{opacity:0;transform:scale(.8) translateY(-80px)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.card-container.mastered .card-inner{animation:masteredFly .55s ease forwards}
.card-container.shake .card-inner{animation:shake .45s ease}
.card-container.appear .card-inner{animation:fadeInUp .4s ease}
@media(max-width:420px){
  header h1{font-size:1.25rem}
  .card-front .word-display{font-size:1.7rem}
  .card-front .word-display.small{font-size:1.15rem}
  .card-back .meaning{font-size:1.25rem}
  .card-back .example-es{font-size:.85rem}
  .btn{font-size:.85rem;padding:13px 12px}
  .card-face{padding:28px 18px}
}
@media(max-width:360px){
  .card-front .word-display{font-size:1.45rem}
  .card-front .word-display.small{font-size:1.05rem}
  .card-back .meaning{font-size:1.1rem}
}
</style>
</head>
<body>
<header>
  <h1><span class="flag">🇪🇸</span> DELE B2 · 每日单词卡</h1>
  <div class="category-badge">📚 B2核心词汇</div>
</header>
<div class="progress-wrap">
  <div class="progress-stats">
    <span id="progressLabel">已掌握：0 / 150</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div class="card-stage" id="cardStage"></div>
<div class="actions" id="actions">
  <button class="btn btn-forgot" id="btnForgot">❌ 忘了</button>
  <button class="btn btn-mastered" id="btnMastered">✅ 记住了</button>
</div>
<footer>
  <button class="btn-reset" id="btnReset">🔄 重置所有数据</button>
</footer>
<div class="toast" id="toast"></div>
<script>
const vocabularyDB = [{"word": "la conciencia", "meaning": "意识；良知", "example": "Es fundamental tener conciencia del impacto ambiental de nuestras acciones.（意识到我们行为对环境的影响是至关重要的。）", "pos": "名词"}, {"word": "el desempleo", "meaning": "失业", "example": "La tasa de desempleo ha disminuido considerablemente en los últimos meses.（近几个月失业率显著下降。）", "pos": "名词"}, {"word": "la desigualdad", "meaning": "不平等", "example": "La desigualdad social sigue siendo uno de los mayores desafíos del país.（社会不平等仍然是该国最大的挑战之一。）", "pos": "名词"}, {"word": "el desarrollo", "meaning": "发展", "example": "El desarrollo sostenible requiere un equilibrio entre economía y medioambiente.（可持续发展需要经济与环境之间的平衡。）", "pos": "名词"}, {"word": "la convivencia", "meaning": "共处；共存", "example": "La convivencia entre distintas culturas enriquece a la sociedad.（不同文化之间的共存使社会更加丰富。）", "pos": "名词"}, {"word": "el compromiso", "meaning": "承诺；责任", "example": "El gobierno adquirió el compromiso de reducir las emisiones de carbono.（政府做出了减少碳排放的承诺。）", "pos": "名词"}, {"word": "la vivienda", "meaning": "住房", "example": "El acceso a una vivienda digna es un derecho fundamental de todo ciudadano.（获得体面住房是每个公民的基本权利。）", "pos": "名词"}, {"word": "la pobreza", "meaning": "贫困", "example": "Numerosas organizaciones luchan contra la pobreza en países en vías de desarrollo.（许多组织在发展中国家与贫困作斗争。）", "pos": "名词"}, {"word": "la incertidumbre", "meaning": "不确定性", "example": "La incertidumbre económica afecta negativamente a las inversiones extranjeras.（经济不确定性对外国投资产生负面影响。）", "pos": "名词"}, {"word": "la sabiduría", "meaning": "智慧", "example": "La sabiduría popular contiene enseñanzas que no deberíamos subestimar.（民间智慧蕴含着不应被低估的教诲。）", "pos": "名词"}, {"word": "la actitud", "meaning": "态度", "example": "Una actitud positiva frente a los problemas facilita la búsqueda de soluciones.（面对问题时积极的态度有助于寻找解决方案。）", "pos": "名词"}, {"word": "el prejuicio", "meaning": "偏见", "example": "Debemos superar los prejuicios para construir una sociedad más inclusiva.（我们必须克服偏见来建设一个更包容的社会。）", "pos": "名词"}, {"word": "la autoestima", "meaning": "自尊", "example": "Una autoestima saludable es clave para el bienestar emocional de las personas.（健康的自尊是人们情感幸福的关键。）", "pos": "名词"}, {"word": "la fortaleza", "meaning": "力量；坚强", "example": "Demostró una gran fortaleza ante las adversidades que se le presentaron.（他在面对困难时表现出了巨大的坚强。）", "pos": "名词"}, {"word": "la debilidad", "meaning": "弱点", "example": "Reconocer nuestras debilidades es el primer paso para superarlas.（承认我们的弱点是克服它们的第一步。）", "pos": "名词"}, {"word": "el fracaso", "meaning": "失败", "example": "El fracaso no es el final, sino una oportunidad para aprender y mejorar.（失败不是终点，而是学习和改进的机会。）", "pos": "名词"}, {"word": "la confianza", "meaning": "信任；信心", "example": "La confianza entre los miembros del equipo es esencial para lograr los objetivos.（团队成员之间的信任对实现目标至关重要。）", "pos": "名词"}, {"word": "la voluntad", "meaning": "意志；意愿", "example": "Sin voluntad política, resulta imposible implementar reformas profundas.（没有政治意愿，就不可能推行深层次的改革。）", "pos": "名词"}, {"word": "el esfuerzo", "meaning": "努力", "example": "Todo esfuerzo tiene su recompensa si se realiza con perseverancia.（只要坚持不懈，一切努力都会有回报。）", "pos": "名词"}, {"word": "la competencia", "meaning": "竞争；能力", "example": "La competencia en el mercado laboral exige una formación continua.（劳动力市场的竞争要求持续学习。）", "pos": "名词"}, {"word": "la ventaja", "meaning": "优势", "example": "Hablar varios idiomas supone una gran ventaja en el mundo globalizado.（会说多种语言在全球化世界中是一个巨大的优势。）", "pos": "名词"}, {"word": "la desventaja", "meaning": "劣势", "example": "Partir de una posición de desventaja no implica que el éxito sea imposible.（从劣势位置出发并不意味着成功是不可能的。）", "pos": "名词"}, {"word": "la globalización", "meaning": "全球化", "example": "La globalización ha transformado profundamente las relaciones comerciales internacionales.（全球化深刻改变了国际贸易关系。）", "pos": "名词"}, {"word": "el consumo", "meaning": "消费", "example": "El consumo responsable es una tendencia cada vez más extendida entre los jóvenes.（负责任消费在年轻人中越来越普遍。）", "pos": "名词"}, {"word": "la contaminación", "meaning": "污染", "example": "La contaminación atmosférica provoca graves problemas de salud en las grandes ciudades.（空气污染在大城市引发严重的健康问题。）", "pos": "名词"}, {"word": "el propósito", "meaning": "目的；意图", "example": "El propósito de esta investigación es analizar los efectos del cambio climático.（这项研究的目的是分析气候变化的影响。）", "pos": "名词"}, {"word": "el desafío", "meaning": "挑战", "example": "Enfrentarse a nuevos desafíos es la mejor manera de crecer profesionalmente.（面对新挑战是职业成长的最佳方式。）", "pos": "名词"}, {"word": "el testimonio", "meaning": "证词；见证", "example": "El testimonio de los testigos fue determinante para resolver el caso.（证人的证词对解决案件起到了决定性作用。）", "pos": "名词"}, {"word": "la escasez", "meaning": "稀缺；短缺", "example": "La escasez de agua potable afecta a millones de personas en todo el mundo.（饮用水的短缺影响着全球数百万人。）", "pos": "名词"}, {"word": "la advertencia", "meaning": "警告", "example": "Las autoridades lanzaron una advertencia sobre los riesgos de la ola de calor.（当局就热浪风险发出了警告。）", "pos": "名词"}, {"word": "llevar a cabo", "meaning": "实施；执行", "example": "La empresa llevará a cabo un plan de reestructuración el próximo trimestre.（公司将在下个季度实施重组计划。）", "pos": "动词短语"}, {"word": "tener en cuenta", "meaning": "考虑到", "example": "Hay que tener en cuenta todos los factores antes de tomar una decisión.（在做决定之前必须考虑所有因素。）", "pos": "动词短语"}, {"word": "darse cuenta de", "meaning": "意识到", "example": "No se dio cuenta de su error hasta que fue demasiado tarde.（直到太晚了他才意识到自己的错误。）", "pos": "动词短语"}, {"word": "hacer hincapié en", "meaning": "强调", "example": "El profesor hizo hincapié en la importancia de la lectura crítica.（老师强调了批判性阅读的重要性。）", "pos": "动词短语"}, {"word": "tomar medidas", "meaning": "采取措施", "example": "Es urgente tomar medidas para frenar el cambio climático.（迫切需要采取措施遏制气候变化。）", "pos": "动词短语"}, {"word": "poner en marcha", "meaning": "启动；推行", "example": "El nuevo sistema de transporte se pondrá en marcha a principios de año.（新的交通系统将在年初启动。）", "pos": "动词短语"}, {"word": "estar a favor de", "meaning": "支持", "example": "La mayoría de los encuestados está a favor de la reforma educativa.（大多数受访者支持教育改革。）", "pos": "动词短语"}, {"word": "estar en contra de", "meaning": "反对", "example": "Muchos ciudadanos están en contra de la construcción de la nueva autopista.（许多市民反对修建新的高速公路。）", "pos": "动词短语"}, {"word": "sacar provecho de", "meaning": "利用；从中获益", "example": "Supo sacar provecho de su experiencia internacional para conseguir el puesto.（他懂得利用自己的国际经验来获得这个职位。）", "pos": "动词短语"}, {"word": "prestar atención", "meaning": "注意", "example": "Hay que prestar atención a los detalles para evitar errores innecesarios.（必须注意细节以避免不必要的错误。）", "pos": "动词短语"}, {"word": "tener que ver con", "meaning": "与……有关", "example": "Sus problemas de salud tienen que ver con el estrés laboral que padece.（他的健康问题与他承受的工作压力有关。）", "pos": "动词短语"}, {"word": "dar lugar a", "meaning": "导致；引起", "example": "La mala comunicación dio lugar a numerosos malentendidos en el equipo.（沟通不畅导致了团队中的诸多误解。）", "pos": "动词短语"}, {"word": "hacer frente a", "meaning": "面对；应对", "example": "La empresa tuvo que hacer frente a una crisis financiera sin precedentes.（公司不得不应对一场前所未有的金融危机。）", "pos": "动词短语"}, {"word": "echar la culpa", "meaning": "责怪", "example": "Es inútil echar la culpa a los demás sin asumir la propia responsabilidad.（不承担自己的责任而责怪他人是无用的。）", "pos": "动词短语"}, {"word": "tomar una decisión", "meaning": "做决定", "example": "Antes de tomar una decisión tan importante, conviene consultar con un experto.（在做出如此重要的决定之前，最好咨询专家。）", "pos": "动词短语"}, {"word": "cambiar de opinión", "meaning": "改变主意", "example": "Al principio se negó, pero luego cambió de opinión al escuchar los argumentos.（起初他拒绝了，但后来听了论据后改变了主意。）", "pos": "动词短语"}, {"word": "poner de manifiesto", "meaning": "表明；揭示", "example": "El informe pone de manifiesto las carencias del sistema sanitario actual.（该报告揭示了当前医疗系统的不足。）", "pos": "动词短语"}, {"word": "caer en la cuenta", "meaning": "突然明白；恍然大悟", "example": "De repente cayó en la cuenta de que había estado equivocado todo el tiempo.（他突然意识到自己一直都错了。）", "pos": "动词短语"}, {"word": "tener sentido", "meaning": "有道理", "example": "Su propuesta no tiene sentido desde el punto de vista económico.（从经济角度来看，他的提议毫无道理。）", "pos": "动词短语"}, {"word": "valer la pena", "meaning": "值得", "example": "Estudiar un idioma extranjero siempre vale la pena, aunque requiera mucho esfuerzo.（学习外语总是值得的，尽管需要付出很多努力。）", "pos": "动词短语"}, {"word": "estar de acuerdo", "meaning": "同意", "example": "No todos los expertos están de acuerdo con las conclusiones del estudio.（并非所有专家都同意该研究的结论。）", "pos": "动词短语"}, {"word": "llamar la atención", "meaning": "引起注意", "example": "El aumento de los precios ha llamado la atención de las autoridades de consumo.（物价上涨已经引起了消费监管部门的注意。）", "pos": "动词短语"}, {"word": "salir adelante", "meaning": "走出困境；前进", "example": "A pesar de las dificultades económicas, la familia logró salir adelante.（尽管经济困难，这家人还是成功走出了困境。）", "pos": "动词短语"}, {"word": "tener lugar", "meaning": "发生；举行", "example": "La ceremonia de entrega de premios tendrá lugar el próximo viernes.（颁奖典礼将于下周五举行。）", "pos": "动词短语"}, {"word": "formar parte de", "meaning": "成为……的一部分", "example": "Formar parte de un equipo multicultural es una experiencia muy enriquecedora.（成为一个多元文化团队的一员是一种非常充实的体验。）", "pos": "动词短语"}, {"word": "hacer daño", "meaning": "伤害", "example": "Las críticas constructivas no hacen daño; al contrario, ayudan a mejorar.（建设性的批评不会造成伤害；相反，它有助于改进。）", "pos": "动词短语"}, {"word": "tener éxito", "meaning": "成功", "example": "Para tener éxito en el mundo digital, es imprescindible adaptarse a los cambios.（要在数字世界取得成功，适应变化是必不可少的。）", "pos": "动词短语"}, {"word": "poner en duda", "meaning": "质疑", "example": "Nadie pone en duda su capacidad profesional, pero su actitud deja mucho que desear.（没有人质疑他的专业能力，但他的态度令人不敢恭维。）", "pos": "动词短语"}, {"word": "recurrir a", "meaning": "求助于；动用", "example": "Ante la falta de recursos, tuvieron que recurrir a la financiación externa.（由于缺乏资源，他们不得不求助于外部融资。）", "pos": "动词短语"}, {"word": "contar con", "meaning": "拥有；依靠", "example": "Para este proyecto contamos con el apoyo incondicional de la dirección.（对于这个项目，我们拥有管理层的无条件支持。）", "pos": "动词短语"}, {"word": "a pesar de", "meaning": "尽管", "example": "A pesar de la lluvia, el concierto se celebró con gran éxito.（尽管下雨，音乐会仍然成功举行。）", "pos": "连词"}, {"word": "en cuanto a", "meaning": "关于；至于", "example": "En cuanto a la propuesta presentada, el comité la evaluará la próxima semana.（至于所提交的提案，委员会将在下周进行评估。）", "pos": "连词"}, {"word": "con el fin de", "meaning": "为了", "example": "Se han implementado nuevas políticas con el fin de mejorar la calidad educativa.（为了改善教育质量，已经实施了新的政策。）", "pos": "连词"}, {"word": "no obstante", "meaning": "然而", "example": "El proyecto es ambicioso; no obstante, resulta viable con los recursos adecuados.（这个项目雄心勃勃；然而，在适当的资源下是可行的。）", "pos": "连词"}, {"word": "sin embargo", "meaning": "然而；但是", "example": "La teoría es sólida; sin embargo, su aplicación práctica presenta dificultades.（理论是可靠的；然而，其实际应用存在困难。）", "pos": "连词"}, {"word": "por lo tanto", "meaning": "因此", "example": "No se alcanzaron los objetivos previstos; por lo tanto, será necesario revisar la estrategia.（未能达到预期目标；因此，有必要重新审视策略。）", "pos": "连词"}, {"word": "a través de", "meaning": "通过", "example": "El conocimiento se transmite no solo a través de los libros, sino también de la experiencia.（知识不仅通过书本，也通过经验来传递。）", "pos": "介词短语"}, {"word": "en vez de", "meaning": "代替；而不是", "example": "En vez de quejarse, propuso soluciones concretas al problema.（他没有抱怨，而是提出了解决问题的具体方案。）", "pos": "连词"}, {"word": "a causa de", "meaning": "由于", "example": "El vuelo se canceló a causa de las condiciones meteorológicas adversas.（由于恶劣的天气条件，航班被取消了。）", "pos": "介词短语"}, {"word": "a lo largo de", "meaning": "在……期间；沿着", "example": "A lo largo de su carrera, ha publicado más de veinte artículos científicos.（在他的职业生涯中，他发表了二十多篇科学论文。）", "pos": "介词短语"}, {"word": "siempre que", "meaning": "只要", "example": "Puedes utilizar mi ordenador siempre que lo cuides adecuadamente.（只要你好好爱护，就可以使用我的电脑。）", "pos": "连词"}, {"word": "puesto que", "meaning": "既然；因为", "example": "Puesto que no hay objeciones, procederemos a la votación.（既然没有异议，我们将进行投票。）", "pos": "连词"}, {"word": "ya que", "meaning": "因为；既然", "example": "No pudo asistir a la reunión, ya que se encontraba de viaje en el extranjero.（他未能参加会议，因为他当时在国外出差。）", "pos": "连词"}, {"word": "en cambio", "meaning": "相反", "example": "El primer borrador era confuso; en cambio, la versión final resultó muy clara.（初稿很混乱；相反，最终版本却非常清晰。）", "pos": "连词"}, {"word": "a fin de que", "meaning": "以便；为了", "example": "Se envió la documentación con antelación a fin de que todos pudieran revisarla.（文件提前发出，以便所有人都能审阅。）", "pos": "连词"}, {"word": "carecer", "meaning": "缺乏", "example": "El informe carece de datos fiables que respalden las conclusiones.（该报告缺乏可靠的数据来支持结论。）", "pos": "动词"}, {"word": "fomentar", "meaning": "促进；推动", "example": "Las escuelas deben fomentar el pensamiento crítico entre los estudiantes.（学校应该培养学生的批判性思维。）", "pos": "动词"}, {"word": "desempeñar", "meaning": "担任；履行", "example": "Desempeñó el cargo de director general durante más de diez años.（他担任总经理一职超过十年。）", "pos": "动词"}, {"word": "prescindir", "meaning": "免除；放弃", "example": "La empresa decidió prescindir de los servicios del proveedor externo.（公司决定不再使用外部供应商的服务。）", "pos": "动词"}, {"word": "quejarse", "meaning": "抱怨", "example": "En lugar de quejarse constantemente, debería buscar soluciones a sus problemas.（与其不断抱怨，他应该寻找解决问题的方法。）", "pos": "动词"}, {"word": "aprobar", "meaning": "通过；批准", "example": "El parlamento aprobó la nueva ley de protección medioambiental por unanimidad.（议会一致通过了新的环境保护法。）", "pos": "动词"}, {"word": "suspender", "meaning": "暂停；不及格", "example": "Suspendieron temporalmente las obras debido a un problema de seguridad.（由于安全问题，他们暂停了施工。）", "pos": "动词"}, {"word": "merecer", "meaning": "值得", "example": "Su dedicación y esfuerzo merecen el reconocimiento de toda la organización.（他的奉献和努力值得整个组织的认可。）", "pos": "动词"}, {"word": "presuponer", "meaning": "预设；假定", "example": "No debemos presuponer que todos comparten nuestra misma opinión.（我们不应该预设所有人都和我们持有同样的观点。）", "pos": "动词"}, {"word": "aportar", "meaning": "贡献；提供", "example": "Cada miembro del equipo aportó ideas valiosas al proyecto.（团队的每个成员都为项目贡献了宝贵的想法。）", "pos": "动词"}, {"word": "surgir", "meaning": "出现；产生", "example": "Surgieron varios problemas inesperados durante la implementación del plan.（在计划实施过程中出现了几个意想不到的问题。）", "pos": "动词"}, {"word": "prever", "meaning": "预见；预料", "example": "Los expertos prevén un aumento significativo de la demanda energética.（专家们预计能源需求将显著增长。）", "pos": "动词"}, {"word": "imponer", "meaning": "强加；施加", "example": "No se puede imponer una cultura sobre otra sin generar conflictos.（不能将一种文化强加于另一种文化而不引发冲突。）", "pos": "动词"}, {"word": "emprender", "meaning": "着手；从事", "example": "Decidió emprender un nuevo negocio tras años de experiencia en el sector.（在该行业多年经验之后，他决定创办一家新企业。）", "pos": "动词"}, {"word": "superar", "meaning": "克服；超越", "example": "Con determinación y trabajo en equipo lograron superar todos los obstáculos.（凭借决心和团队合作，他们成功克服了所有障碍。）", "pos": "动词"}, {"word": "rechazar", "meaning": "拒绝", "example": "El comité rechazó la propuesta por no ajustarse a los requisitos establecidos.（委员会因提案不符合既定要求而予以拒绝。）", "pos": "动词"}, {"word": "asumir", "meaning": "承担；接受", "example": "Asumió la responsabilidad del error y se disculpó públicamente.（他承担了错误的责任并公开道歉。）", "pos": "动词"}, {"word": "disponer", "meaning": "拥有；安排", "example": "El centro dispone de todas las instalaciones necesarias para la investigación.（该中心拥有研究所必需的所有设施。）", "pos": "动词"}, {"word": "incrementar", "meaning": "增加", "example": "La empresa pretende incrementar su presencia en el mercado asiático.（公司打算增加其在亚洲市场的存在。）", "pos": "动词"}, {"word": "disminuir", "meaning": "减少", "example": "El consumo de tabaco ha disminuido notablemente gracias a las campañas de concienciación.（由于宣传活动，烟草消费显著减少了。）", "pos": "动词"}, {"word": "solicitar", "meaning": "申请；请求", "example": "Los estudiantes pueden solicitar una beca antes del próximo 15 de marzo.（学生可以在明年3月15日之前申请奖学金。）", "pos": "动词"}, {"word": "garantizar", "meaning": "保证", "example": "La Constitución garantiza la libertad de expresión de todos los ciudadanos.（宪法保障所有公民的言论自由。）", "pos": "动词"}, {"word": "invertir", "meaning": "投资", "example": "Es necesario invertir más recursos en energías renovables para un futuro sostenible.（为了可持续的未来，需要在可再生能源方面投入更多资源。）", "pos": "动词"}, {"word": "mantener", "meaning": "保持；维持", "example": "Es importante mantener un equilibrio entre la vida personal y profesional.（保持个人生活与职业生活之间的平衡非常重要。）", "pos": "动词"}, {"word": "destacar", "meaning": "突出；强调", "example": "Cabe destacar la importancia del trabajo en equipo para el éxito del proyecto.（值得强调的是团队合作对项目成功的重要性。）", "pos": "动词"}, {"word": "perjudicar", "meaning": "损害", "example": "La difusión de noticias falsas puede perjudicar gravemente la reputación de una persona.（传播假新闻可能严重损害一个人的声誉。）", "pos": "动词"}, {"word": "empeorar", "meaning": "恶化", "example": "Si no se toman medidas urgentes, la situación económica podría empeorar.（如果不采取紧急措施，经济状况可能会恶化。）", "pos": "动词"}, {"word": "mejorar", "meaning": "改善", "example": "El objetivo de la reforma es mejorar la calidad del sistema educativo público.（改革的目标是改善公立教育体系的质量。）", "pos": "动词"}, {"word": "exigir", "meaning": "要求", "example": "El nuevo reglamento exige que todos los empleados reciban formación en seguridad.（新规定要求所有员工接受安全培训。）", "pos": "动词"}, {"word": "negarse", "meaning": "拒绝", "example": "Se negó rotundamente a participar en una actividad que consideraba poco ética.（他断然拒绝参与他认为不道德的活动。）", "pos": "动词"}, {"word": "pertenecer", "meaning": "属于", "example": "Estas tierras pertenecen a la comunidad indígena desde tiempos ancestrales.（这些土地自古以来就属于土著社区。）", "pos": "动词"}, {"word": "sustituir", "meaning": "替代", "example": "La energía solar podría sustituir gradualmente a los combustibles fósiles.（太阳能可以逐渐替代化石燃料。）", "pos": "动词"}, {"word": "distribuir", "meaning": "分配", "example": "Es fundamental distribuir los recursos de manera equitativa entre todas las regiones.（在所有地区之间公平分配资源至关重要。）", "pos": "动词"}, {"word": "defender", "meaning": "捍卫", "example": "El abogado defendió los derechos de los trabajadores ante el tribunal.（律师在法庭上捍卫了工人的权利。）", "pos": "动词"}, {"word": "arrepentirse", "meaning": "后悔", "example": "Más vale actuar con prudencia que arrepentirse después de una decisión precipitada.（谨慎行事比仓促决定后后悔要好。）", "pos": "动词"}, {"word": "atreverse", "meaning": "敢于", "example": "Pocos se atreven a desafiar las normas establecidas por miedo a las consecuencias.（很少有人敢于挑战既定规则，因为害怕后果。）", "pos": "动词"}, {"word": "agradecer", "meaning": "感谢", "example": "Quisiera agradecer a todos los que han hecho posible la realización de este proyecto.（我想感谢所有使这个项目得以实现的人。）", "pos": "动词"}, {"word": "sospechar", "meaning": "怀疑", "example": "La policía sospecha que el incendio fue provocado intencionadamente.（警方怀疑火灾是有人蓄意纵火。）", "pos": "动词"}, {"word": "presenciar", "meaning": "目睹；在场", "example": "Tuve la suerte de presenciar uno de los espectáculos más impresionantes de mi vida.（我有幸目睹了我一生中最令人印象深刻的演出之一。）", "pos": "动词"}, {"word": "subrayar", "meaning": "强调；下划线", "example": "El ponente subrayó la necesidad de una cooperación internacional más estrecha.（发言人强调了更紧密国际合作的必要性。）", "pos": "动词"}, {"word": "sostenible", "meaning": "可持续的", "example": "El turismo sostenible es una prioridad para la conservación del patrimonio natural.（可持续旅游是保护自然遗产的优先事项。）", "pos": "形容词"}, {"word": "eficaz", "meaning": "有效的", "example": "Se ha demostrado que este medicamento es muy eficaz contra la enfermedad.（已经证明这种药物对该疾病非常有效。）", "pos": "形容词"}, {"word": "riguroso", "meaning": "严格的；严谨的", "example": "El estudio fue sometido a un riguroso control de calidad antes de su publicación.（该研究在发表前经过了严格的质量控制。）", "pos": "形容词"}, {"word": "obsoleto", "meaning": "过时的；陈旧的", "example": "Muchas de las tecnologías actuales quedarán obsoletas en menos de una década.（许多当前的技术将在不到十年内变得过时。）", "pos": "形容词"}, {"word": "factible", "meaning": "可行的", "example": "Tras el análisis preliminar, el proyecto parece técnica y económicamente factible.（经过初步分析，该项目在技术和经济上似乎是可行的。）", "pos": "形容词"}, {"word": "imprescindible", "meaning": "不可或缺的", "example": "El agua es un recurso imprescindible para la supervivencia de cualquier ser vivo.（水是任何生物生存不可或缺的资源。）", "pos": "形容词"}, {"word": "innegable", "meaning": "不可否认的", "example": "Es innegable que la tecnología ha transformado nuestra forma de comunicarnos.（不可否认技术已经改变了我们的沟通方式。）", "pos": "形容词"}, {"word": "abrumador", "meaning": "压倒性的；令人难以承受的", "example": "La cantidad de información disponible en internet puede resultar abrumadora.（互联网上可获取的信息量可能令人难以承受。）", "pos": "形容词"}, {"word": "asequible", "meaning": "可负担的；可及的", "example": "El objetivo del programa es ofrecer una vivienda asequible a las familias jóvenes.（该计划的目标是为年轻家庭提供可负担的住房。）", "pos": "形容词"}, {"word": "beneficioso", "meaning": "有益的", "example": "Practicar ejercicio de forma regular es beneficioso tanto para el cuerpo como para la mente.（定期锻炼对身体和心理都有益。）", "pos": "形容词"}, {"word": "perjudicial", "meaning": "有害的", "example": "El consumo excesivo de azúcar es perjudicial para la salud cardiovascular.（过量摄入糖分对心血管健康有害。）", "pos": "形容词"}, {"word": "novedoso", "meaning": "新颖的", "example": "La startup presentó un producto novedoso que revolucionó el mercado.（那家创业公司推出了一款颠覆市场的新颖产品。）", "pos": "形容词"}, {"word": "contradictorio", "meaning": "矛盾的", "example": "Sus declaraciones resultaron contradictorias y generaron desconfianza entre los votantes.（他的声明前后矛盾，引起了选民的不信任。）", "pos": "形容词"}, {"word": "desafiante", "meaning": "具有挑战性的", "example": "El voluntariado en zonas de conflicto es una experiencia desafiante pero muy gratificante.（在冲突地区做志愿者是一种充满挑战但非常有意义的经历。）", "pos": "形容词"}, {"word": "enriquecedor", "meaning": "充实的；丰富的", "example": "Viajar y conocer otras culturas es una de las experiencias más enriquecedoras que existen.（旅行并了解其他文化是最充实的经历之一。）", "pos": "形容词"}, {"word": "gratificante", "meaning": "令人满足的", "example": "Enseñar a niños es una tarea exigente pero profundamente gratificante.（教孩子是一项要求很高但非常有满足感的工作。）", "pos": "形容词"}, {"word": "inminente", "meaning": "迫在眉睫的", "example": "Ante el peligro inminente, las autoridades ordenaron la evacuación inmediata.（面对迫在眉睫的危险，当局下令立即疏散。）", "pos": "形容词"}, {"word": "inevitable", "meaning": "不可避免的", "example": "El cambio es inevitable; lo importante es cómo nos adaptamos a él.（变化是不可避免的；重要的是我们如何适应它。）", "pos": "形容词"}, {"word": "polémico", "meaning": "有争议的", "example": "El nuevo plan urbanístico ha sido muy polémico entre los residentes del barrio.（新的城市规划在当地居民中引起了很大争议。）", "pos": "形容词"}, {"word": "revelador", "meaning": "揭示性的；有启发性的", "example": "Los resultados de la encuesta fueron muy reveladores sobre la opinión pública.（调查结果非常能揭示公众舆论的状况。）", "pos": "形容词"}, {"word": "significativo", "meaning": "重要的；显著的", "example": "Se ha observado un aumento significativo en el número de estudiantes universitarios.（大学生数量出现了显著增长。）", "pos": "形容词"}, {"word": "sorprendente", "meaning": "令人惊讶的", "example": "Resulta sorprendente la rapidez con la que se ha extendido la noticia.（消息传播的速度令人惊讶。）", "pos": "形容词"}, {"word": "vulnerable", "meaning": "脆弱的；易受伤害的", "example": "Los niños son especialmente vulnerables a los efectos de la contaminación.（儿童尤其容易受到污染的影响。）", "pos": "形容词"}, {"word": "inesperado", "meaning": "出乎意料的", "example": "Su dimisión fue completamente inesperada y causó una gran conmoción.（他的辞职完全出乎意料，引起了巨大震动。）", "pos": "形容词"}, {"word": "previsible", "meaning": "可预见的", "example": "Las consecuencias de una mala gestión son, en gran medida, previsibles.（管理不善的后果在很大程度上是可预见的。）", "pos": "形容词"}, {"word": "vergonzoso", "meaning": "令人羞愧的；可耻的", "example": "Es vergonzoso que en pleno siglo XXI todavía existan tales niveles de pobreza.（在21世纪的今天还存在如此程度的贫困，这是令人羞愧的。）", "pos": "形容词"}, {"word": "desagradable", "meaning": "令人不快的", "example": "El olor desagradable provenía de la fábrica cercana al barrio residencial.（令人不快的气味来自靠近居民区的工厂。）", "pos": "形容词"}, {"word": "indispensable", "meaning": "必不可少的", "example": "La colaboración internacional es indispensable para combatir el terrorismo.（国际合作对于打击恐怖主义是必不可少的。）", "pos": const STORAGE_KEY = 'deleB2_mastered';
const TOTAL = vocabularyDB.length;
let masteredSet = new Set();
let currentQueue = [];
let currentIndex = -1;
let isFlipped = false;
let isAnimating = false;

const cardStage = document.getElementById('cardStage');
const actionsEl = document.getElementById('actions');
const btnForgot = document.getElementById('btnForgot');
const btnMastered = document.getElementById('btnMastered');
const btnReset = document.getElementById('btnReset');
const progressLabel = document.getElementById('progressLabel');
const progressPercent = document.getElementById('progressPercent');
const progressFill = document.getElementById('progressFill');
const toast = document.getElementById('toast');

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const arr = JSON.parse(raw);
      masteredSet = new Set(arr.filter(i => i >= 0 && i < TOTAL));
    }
  }catch(e){ masteredSet = new Set(); }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...masteredSet]));
}

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildQueue(){
  const unmastered = [];
  for(let i = 0; i < TOTAL; i++){
    if(!masteredSet.has(i)) unmastered.push(i);
  }
  currentQueue = shuffle(unmastered);
  currentIndex = -1;
}

function updateProgress(){
  const mastered = masteredSet.size;
  const pct = TOTAL > 0 ? Math.round((mastered / TOTAL) * 100) : 0;
  progressLabel.textContent = '\u5df2\u638c\u63e1\uff1a' + mastered + ' / ' + TOTAL;
  progressPercent.textContent = pct + '%';
  progressFill.style.width = pct + '%';
}

let toastTimer;
function showToast(msg, type){
  type = type || '';
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  toastTimer = setTimeout(function(){ toast.className = 'toast'; }, 1800);
}

function isLongWord(w){ return w.length > 18; }

function buildCardHTML(wordObj){
  var w = wordObj.word;
  var sizeClass = isLongWord(w) ? ' small' : '';
  var parts = wordObj.example.split('\uff08');
  var esText = parts[0];
  var zhText = parts[1] ? parts[1].replace('\uff09','') : '';
  return '<div class="card-container appear" id="cardContainer">' +
    '<div class="card-inner" id="cardInner">' +
    '<div class="card-face card-front">' +
    '<span class="pos-tag">' + wordObj.pos + '</span>' +
    '<div class="word-display' + sizeClass + '">' + w + '</div>' +
    '<span class="tap-hint">\ud83d\udc46 \u70b9\u51fb\u7ffb\u8f6c\u5361\u7247</span>' +
    '</div>' +
    '<div class="card-face card-back">' +
    '<span class="pos-full">' + wordObj.pos + '</span>' +
    '<div class="meaning">' + wordObj.meaning + '</div>' +
    '<div class="example-box">' +
    '<div class="example-es">' + esText + '</div>' +
    '<div class="example-zh">' + zhText + '</div>' +
    '</div></div></div></div>';
}

function showNextWord(){
  if(isAnimating) return;
  currentIndex++;
  if(currentIndex >= currentQueue.length){
    showCompleted();
    return;
  }
  var wordObj = vocabularyDB[currentQueue[currentIndex]];
  cardStage.innerHTML = buildCardHTML(wordObj);
  isFlipped = false;
  actionsEl.style.display = 'flex';
  btnForgot.style.display = 'flex';
  btnMastered.style.display = 'flex';
  var container = document.getElementById('cardContainer');
  var inner = document.getElementById('cardInner');
  container.addEventListener('click', function(){ flipCard(container, inner); });
}

function flipCard(container, inner){
  if(isAnimating) return;
  isFlipped = !isFlipped;
  if(isFlipped){ inner.classList.add('flipped'); }
  else { inner.classList.remove('flipped'); }
}

function showCompleted(){
  cardStage.innerHTML = '<div class="completed">' +
    '<span class="trophy">\ud83c\udfc6</span>' +
    '<h2>\u00a1Felicidades! \u606d\u559c\uff01</h2>' +
    '<p>\u4f60\u5df2\u7ecf\u638c\u63e1\u4e86\u5168\u90e8 ' + TOTAL + ' \u4e2a DELE B2 \u6838\u5fc3\u8bcd\u6c47\uff01</p>' +
    '<p style="margin-top:12px">\ud83c\udf89 \u00a1Buen trabajo! \u7ee7\u7eed\u4fdd\u6301\uff01</p>' +
    '</div>';
  actionsEl.style.display = 'none';
  updateProgress();
}

function markMastered(){
  if(isAnimating || currentIndex >= currentQueue.length) return;
  isAnimating = true;
  var wordIdx = currentQueue[currentIndex];
  masteredSet.add(wordIdx);
  saveState();
  updateProgress();
  var container = document.getElementById('cardContainer');
  container.classList.add('mastered');
  showToast('\u2705 \u5df2\u638c\u63e1\uff1a' + vocabularyDB[wordIdx].word, 'success');
  setTimeout(function(){
    isAnimating = false;
    showNextWord();
  }, 550);
}

function markForgot(){
  if(isAnimating || currentIndex >= currentQueue.length) return;
  isAnimating = true;
  var container = document.getElementById('cardContainer');
  container.classList.add('shake');
  showToast('\ud83d\udd04 \u4e0b\u6b21\u518d\u6765\uff1a' + vocabularyDB[currentQueue[currentIndex]].word);
  setTimeout(function(){
    isAnimating = false;
    showNextWord();
  }, 450);
}

function resetAll(){
  if(!confirm('\u786e\u5b9a\u8981\u91cd\u7f6e\u6240\u6709\u5b66\u4e60\u6570\u636e\u5417\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u64a4\u9500\u3002')) return;
  masteredSet.clear();
  localStorage.removeItem(STORAGE_KEY);
  buildQueue();
  updateProgress();
  if(currentQueue.length === 0){ showCompleted(); }
  else { showNextWord(); }
  showToast('\ud83d\udd04 \u6570\u636e\u5df2\u91cd\u7f6e');
}

function init(){
  loadState();
  buildQueue();
  updateProgress();
  if(currentQueue.length === 0){ showCompleted(); }
  else { showNextWord(); }
}

btnForgot.addEventListener('click', markForgot);
btnMastered.addEventListener('click', markMastered);
btnReset.addEventListener('click', resetAll);
init();

</script>
